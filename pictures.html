<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📸 Album 1</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#ff9ec4,#ffd6e7,#b57edc,#6c5ce7);
background-size:400% 400%;
animation:bg 15s infinite alternate;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

.container{
width:90%;
max-width:1300px;
margin:40px auto;
}

h1{
text-align:center;
color:white;
font-size:50px;
margin-bottom:10px;
}

p{
text-align:center;
color:white;
font-size:22px;
margin-bottom:35px;
}

.gallery{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;

}

.photo{

background:white;
padding:12px;
border-radius:20px;
cursor:pointer;
transition:.35s;
box-shadow:0 15px 35px rgba(0,0,0,.25);

}

.photo:hover{

transform:translateY(-10px) scale(1.03);

}

.photo img{

width:100%;
height:320px;
object-fit:cover;
border-radius:15px;

}

.popup{

display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:9999;

}

.popup img{

max-width:90%;
max-height:90%;
border-radius:15px;
box-shadow:0 0 40px white;

}

.close{

position:absolute;
top:20px;
right:40px;
font-size:55px;
color:white;
cursor:pointer;

}

.back{

display:block;
width:230px;
margin:50px auto;
padding:16px;
text-align:center;
text-decoration:none;
background:white;
color:#ff2d75;
font-size:22px;
font-weight:bold;
border-radius:50px;

}

.back:hover{

background:#ffe4ef;

}

.heart{

position:fixed;
bottom:-40px;
pointer-events:none;
animation:floatUp linear forwards;

}

@keyframes floatUp{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

</style>

</head>

<div class="popup" id="popup" onclick="hide()">
<span class="close">&times;</span>
<img id="popupImage">
</div>

<script>

function show(src){
document.getElementById("popup").style.display="flex";
document.getElementById("popupImage").src=src;
}

function hide(){
document.getElementById("popup").style.display="none";
}

document.addEventListener("keydown",e=>{
if(e.key==="Escape") hide();
});

setInterval(()=>{
const h=document.createElement("div");
h.className="heart";
h.innerHTML=["❤️","💖","💕","🌸","✨"][Math.floor(Math.random()*5)];
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(20+Math.random()*25)+"px";
h.style.animationDuration=(4+Math.random()*5)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),9000);
},300);

</script>
