<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wrong Password</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(-45deg,#ff6b81,#ff9a9e,#fad0c4,#ffdde1,#ff758c);
background-size:400% 400%;
animation:bg 15s ease infinite;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.card{

width:500px;

padding:45px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(18px);

border-radius:30px;

text-align:center;

box-shadow:0 20px 45px rgba(0,0,0,.25);

z-index:5;

border:1px solid rgba(255,255,255,.3);

}

.heart{

font-size:90px;

animation:shake 1.2s infinite;

}

@keyframes shake{

0%{transform:rotate(0deg);}
20%{transform:rotate(-10deg);}
40%{transform:rotate(10deg);}
60%{transform:rotate(-8deg);}
80%{transform:rotate(8deg);}
100%{transform:rotate(0deg);}

}

h1{

font-size:45px;

color:white;

margin-top:15px;

}

p{

font-size:23px;

color:white;

margin-top:20px;

line-height:1.8;

}

button{

margin-top:35px;

padding:15px 40px;

font-size:22px;

background:white;

color:#ff2d75;

border:none;

border-radius:50px;

cursor:pointer;

transition:.35s;

font-weight:bold;

}

button:hover{

transform:scale(1.08);

background:#ffe6ef;

}

/* Floating Roses & Flowers */

.item{

position:fixed;

bottom:-40px;

pointer-events:none;

animation:float linear forwards;

}

@keyframes float{

0%{

transform:translateY(0) rotate(0deg);

opacity:1;

}

100%{

transform:translateY(-120vh) rotate(360deg);

opacity:0;

}

}

</style>

</head>

<body>

<div class="card">

<div class="heart">💔</div>

<h1>Wrong Password</h1>

<p>

Alex,
<br><br>

That wasn't the correct password.

Try again... maybe your memory will help this time. ❤️

</p>

<button onclick="window.location.href='index.html'">

🔄 Try Again

</button>

</div>

<script>

function flower(){

const f=document.createElement("div");

f.className="item";

const emoji=[

"🌹",
"🌸",
"🌺",
"🥀",
"💔",
"❤️",
"🪷",
"🌷",
"✨"

];

f.innerHTML=emoji[Math.floor(Math.random()*emoji.length)];

f.style.left=Math.random()*100+"vw";

f.style.fontSize=(20+Math.random()*35)+"px";

f.style.animationDuration=(4+Math.random()*5)+"s";

document.body.appendChild(f);

setTimeout(()=>{

f.remove();

},9000);

}

setInterval(flower,220);

</script>

</body>
</html>
