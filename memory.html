<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📸 Childhood Memories</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#ffb6c1,#ffe4ec,#fff6fb);
overflow-x:hidden;
}

.container{
max-width:1300px;
margin:auto;
padding:40px 20px;
}

.header{
background:white;
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.15);
margin-bottom:40px;
}

.header h1{
font-size:55px;
color:#ff2d75;
}

.header p{
margin-top:15px;
font-size:20px;
color:#666;
line-height:1.6;
}

.gallery-title{
font-size:38px;
color:#ff2d75;
margin-bottom:20px;
text-align:center;
}

.gallery{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;

}

.photo{

background:white;
padding:12px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
cursor:pointer;
transition:.3s;

}

.photo:hover{

transform:translateY(-10px);

}

.photo img{

width:100%;
height:300px;
object-fit:cover;
border-radius:15px;

}

.caption{

padding:15px;
font-size:18px;
text-align:center;
color:#555;

}

/* Popup */

.popup{

display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.92);
justify-content:center;
align-items:center;
z-index:999;

}

.popup img{

max-width:90%;
max-height:90%;
border-radius:15px;
box-shadow:0 0 35px white;

}

.close{

position:absolute;
top:20px;
right:35px;
font-size:50px;
color:white;
cursor:pointer;

}

.back{

display:block;
width:220px;
margin:50px auto;
text-align:center;
background:#ff4d88;
color:white;
padding:16px;
border-radius:50px;
text-decoration:none;
font-size:22px;

}

.back:hover{

background:#ff2167;

}

/* Floating Hearts */

.heart{

position:fixed;
bottom:-40px;
pointer-events:none;
animation:floatUp linear forwards;
z-index:-1;

}

@keyframes floatUp{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

</style>

</head>

<script>

function show(src){

document.getElementById("popup").style.display="flex";

document.getElementById("popupImage").src=src;

}

function hide(){

document.getElementById("popup").style.display="none";

}

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

hide();

}

});

function heart(){

const h=document.createElement("div");

h.className="heart";

const emoji=["💖","💕","❤️","💗","🌸","✨"];

h.innerHTML=emoji[Math.floor(Math.random()*emoji.length)];

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*30)+"px";

h.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},8000);

}

setInterval(heart,300);

</script>
