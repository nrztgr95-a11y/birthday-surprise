<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9ec4,#ffd6e7,#fbc2eb);
font-family:Arial;
}

.box{
background:white;
padding:40px;
width:400px;
text-align:center;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
color:#ff2d75;
}

input{
width:90%;
padding:12px;
font-size:18px;
margin-top:15px;
border-radius:10px;
border:2px solid pink;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:18px;
background:#ff4d88;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#ff2167;
}
</style>

</head>

<body>

<div class="box">

<h1>💖 Welcome My Special Person 💖</h1>

<p>🎂 Hint: Your Birthday(nepali date)</p>

<input type="password" id="pass" placeholder="Enter Password">

<br>

<button onclick="check()">Unlock ❤️</button>

</div>

<script>

function check(){

let p=document.getElementById("pass").value;

if(p=="190503"){
location.href="menu.html";
}else{
alert("Wrong Password ❤️");
}

}

</script>

</body>
</html>
