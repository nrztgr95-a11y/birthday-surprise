<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Thank You 💖</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Georgia, serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#fff0f5,#ffe6f2,#fce4ec);
    overflow:hidden;
}

/* Main Card */

.card{
    width:750px;
    background:white;
    padding:60px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.18);
    position:relative;
    z-index:2;
}

h1{
    color:#ff2d75;
    font-size:55px;
    margin-bottom:20px;
}

.line{
    width:120px;
    height:5px;
    background:#ff4d88;
    margin:20px auto 35px;
    border-radius:20px;
}

.message{
    font-size:24px;
    color:#555;
    line-height:2;
}

.name{
    color:#ff2d75;
    font-weight:bold;
    font-size:28px;
}

.from{
    margin-top:45px;
    font-size:26px;
    color:#444;
}

.signature{
    margin-top:15px;
    font-size:34px;
    color:#ff2d75;
    font-weight:bold;
}

.restart{
    display:inline-block;
    margin-top:40px;
    padding:15px 35px;
    background:#ff4d88;
    color:white;
    text-decoration:none;
    border-radius:50px;
    font-size:20px;
    transition:.3s;
}

.restart:hover{
    background:#ff2167;
    transform:scale(1.05);
}

/* Floating Hearts */

.heart{
    position:fixed;
    bottom:-40px;
    pointer-events:none;
    animation:floatUp linear forwards;
    z-index:1;
}

@keyframes floatUp{

0%{
    transform:translateY(0) scale(.8);
    opacity:1;
}

100%{
    transform:translateY(-120vh) scale(1.6);
    opacity:0;
}

}

</style>
</head>

<body>

<div class="card">

<h1>💖 Thank You 💖</h1>

<div class="line"></div>

<div class="message">

Thank you for reading my birthday wish,
<br><br>

<span class="name">ALEX.</span>
<br><br>

Hope to see you happy while reading this.
Your smile is the best gift anyone could ask for, and I hope this little surprise made your birthday even more special.

</div>

<div class="from">

With lots of care,

</div>

<div class="signature">

From the chosen one,<br>
RTX ❤️

</div>

<a href="menu.html" class="restart">
🏠 Back to Home
</a>

</div>

<script>

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

const emojis=["❤️","💖","💕","💗","💞","🌸","✨"];

heart.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
